<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 90" width="360" height="90">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#ff2222;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background transparent -->
  <!-- Drop shadow for depth -->
  <text x="180" y="60"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="56"
    font-weight="900"
    text-anchor="middle"
    fill="rgba(0,0,0,0.5)"
    dx="2" dy="3">POCONG.ID</text>
  <!-- Main text -->
  <text x="180" y="60"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="56"
    font-weight="900"
    text-anchor="middle"
    fill="url(#textGrad)"
    filter="url(#glow)"
    letter-spacing="2">POCONG.ID</text>
  <!-- Underline accent -->
  <rect x="40" y="68" width="280" height="2" rx="1" fill="#8b0000" opacity="0.7"/>
</svg>
